services:
  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: clickeat-api
    working_dir: /var/www/html
    volumes:
      - ./apps/api:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-clickeat.ini:ro
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: clicktoeat
      DB_USERNAME: clicktoeat
      DB_PASSWORD: clicktoeat
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      # php-fpm escucha sólo TCP fastcgi en :9000 (no HTTP). Lo más portable es
      # verificar que el worker maestro existe + que la config es válida.
      test: ["CMD-SHELL", "pgrep -f 'php-fpm: master' > /dev/null && php-fpm -t 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - clickeat

  nginx:
    image: nginx:1.27-alpine
    container_name: clickeat-nginx
    ports:
      - "8080:80"
    volumes:
      - ./apps/api:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # `/up` es el endpoint health de Laravel — devuelve 200 cuando la app boota OK.
      # Pasa por nginx → php-fpm → Laravel, así que valida toda la cadena.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - clickeat

  mysql:
    image: mysql:8.0
    container_name: clickeat-mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clicktoeat
      MYSQL_USER: clicktoeat
      MYSQL_PASSWORD: clicktoeat
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - clickeat

  web:
    image: node:20-alpine
    container_name: clickeat-web
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      # `next dev` tarda en arrancar la primera vez (npm install + compilación).
      # start_period generoso. Después es estable.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - clickeat

networks:
  clickeat:
    driver: bridge

volumes:
  mysql_data:
